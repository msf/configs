[theme]
theme = "dracula"
[icons]
icons = "awesome6"

[[block]]
block = "toggle"
format = " $icon "
command_state = "grep -q performance /sys/firmware/acpi/platform_profile && echo performance || echo"
command_on = "/home/miguel/bin/fw13-power-high"
command_off = "/home/miguel/bin/fw13-power-low"
icon_on = "weather_thunder"
icon_off = "weather_clouds"
interval = 10


[[block]]
block = "battery"
interval = 10
format = " $icon $percentage $time $power "
full_format = " $percentage"
driver = "sysfs"

[[block]]
block = "net"

#[[block]]
#block = "disk_space"
#path = "/"
#info_type = "used"
#format = "{icon} {percentage}"
#alert_absolute = true
#unit = "GB"
#alert = 50
#warning = 40


[[block]]
block = "cpu"
format = " $barchart $utilization "

[[block]]
block = "memory"
format = "MEM: $mem_used_percents ($mem_used/$mem_total) "
format_alt = "SWAP: $swap_used"

[[block]]
block = "amd_gpu"
format_alt = " GPU MEM: $vram_used_percents ($vram_used/$vram_total) "
interval = 10

[[block]]
block = "custom"
command = "n=$(makoctl list | jq '.data | length'); [ \"$n\" -gt 0 ] && echo \"$n\""
format = " ^icon_notification $text "
interval = 5
json = false

[[block]]
block = "sound"
driver = "pulseaudio"

[[block]]
block = "time"
interval = 5
format = " $timestamp.datetime(f:'%d/%m %R') "

