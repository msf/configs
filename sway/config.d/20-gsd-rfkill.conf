# Needed for the GNOME Settings (gnome-control-center) Bluetooth panel to work
# correctly under Sway: it queries gnome-settings-daemon's rfkill helper
# (org.gnome.SettingsDaemon.Rfkill on D-Bus) for adapter/airplane-mode state.
# Without it the panel reports "No Bluetooth Found" despite a working adapter.
exec /usr/libexec/gsd-rfkill
